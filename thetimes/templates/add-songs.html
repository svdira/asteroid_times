{% extends 'base_wiki.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <h2>Add New Song to {{this_album.titulo}}</h2>
    <form method="POST" enctype="multipart/form-data">
    	{% csrf_token %}

        <div class="form-group">
            <label>List of songs</label>
            <textarea name="contenido"></textarea>
        </div>

    
      
        <button class="btn btn-primary">Add Songs</button>
        
    </form>
</div>

{% endblock %}
