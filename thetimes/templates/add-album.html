{% extends 'base_wiki.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <h2>Add New Album</h2>
    <form method="POST" enctype="multipart/form-data">
    	{% csrf_token %}
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="titulo">
        </div>

        <div class="form-group">
            <label>Artist</label>
            <input type="text" name="artista">
        </div>

        <div class="form-group">
            <label>Year</label>
            <input type="text" name="anho">
        </div>

        <div class="form-group">
            <label>Cover</label>
            <input type="file" name = "imagen">&nbsp;
        </div>

    
      
        <button class="btn btn-primary">Add Wiki</button>
        
    </form>
</div>

{% endblock %}
