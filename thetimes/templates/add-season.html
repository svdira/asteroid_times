{% extends 'base_wiki.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <h2>Add New Season of TV Series</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="titulo">
        </div>

        <div >
        <div class="form-group" style="width: 48%; float:left; margin-right: 4%;">
            <label>Type</label>
            <select name="cat_id">
                {% for c in cats %}
                    <option value="{{c.id}}">{{c.category}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="width: 48%; float:left;">
            <label># Episodes</label>
            <input type="text" name="n-episodes">
        </div>
        </div>

        <div style="clear:both;"></div>

        <div >
        <div class="form-group" style="width: 48%; float:left; margin-right: 4%;">
            <label>Premiere Date</label>
            <input type="text" name="premiere-date">
        </div>
        <div class="form-group" style="width: 48%; float:left;">
            <label>Finale Date</label>
            <input type="text" name="finale-date">
        </div>
        </div>

        <div style="clear:both;"></div>
        

        <div class="form-group">
            <label>Cover</label>
            <input type="file" name = "imagen">&nbsp;
        </div>

        <div class="form-group">
            <label>Synopsis</label>
            <textarea name="contenido"></textarea>
        </div>

        <button class="btn btn-primary">Add Season</button>
    </form>
</div>

{% endblock %}
