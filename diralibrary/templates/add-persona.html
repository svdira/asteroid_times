{% extends 'base_lib.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <form method="POST">
    	{% csrf_token %}
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre">
        
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="8"></textarea>
        </div>

      
        <button class="btn btn-primary">Add Persona</button>
        
    </form>
</div>

{% endblock %}
