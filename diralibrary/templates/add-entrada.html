{% extends 'base_lib.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <h2>Add Entrada</h2>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
        <div class="form-group">
            <label>Titulo</label>
            <input type="text" name="titulo">
        </div>

        <div >
            <div class="form-group" style="width: 48%; float:left; margin-right: 4%;">
                <label>Fecha</label>
                <input type="text" name="fecha">
            </div>
            <div class="form-group" style="width: 48%; float:left;">
                <label>Categoria</label>
                <select name="tipo">
                    <option value="journal">Journal</option>
                    <option value="movie">Movie</option>
                    <option value="anime">Anime</option>
                    <option value="show">Show Season</option>
                    <option value="miniseries">Miniseries</option>
                    <option value="tvseries">TV Series</option>
                    <option value="news">News</option>
                    <option value="notas">Notas</option>
            </select>
            </div>
        </div>

        <div style="clear:both;"></div>

        <div class="form-group">
            <label>Cover</label>
            <input type="file" name = "imagen">&nbsp;
        </div>

        <div class="form-group">
            <label>Contenido</label>
            <textarea name="contenido"></textarea>
        </div>

        <div class="form-group">
            <label>Atributos</label>
            <textarea name="atributos"></textarea>
        </div>

        <button class="btn btn-primary">Add Entry</button>
    </form>
</div>

{% endblock %}
