{% extends 'base_wiki.html' %}
{% load static %}

{% block contenido %}


<div class="form-card">
    <form method="POST">
    	{% csrf_token %}
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" value="{{this_persona.nombre}}">
        
        </div>

        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="15">{{this_persona.bio}}</textarea>
        </div>

      
        <button class="btn btn-primary">Save Changes</button>
        
    </form>
</div>

{% endblock %}
